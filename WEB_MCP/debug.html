<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aria · MCP Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-agent">
    <div class="ag-av">⚙</div>
    <div style="display:flex;flex-direction:column;gap:1px">
      <span class="ag-name">Aria</span>
      <span class="ag-sub" id="amodel">connecting…</span>
    </div>
    <span class="badge off" id="abadge">OFFLINE</span>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" id="dbgbtn" onclick="toggleDbg()" title="Event stream">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </button>
  </div>
</nav>

<div class="main">
  <div id="chat-wrap">
    <div id="chat">
      <div class="chat-inner" id="ci">
        <div class="welcome">
          <div class="w-head">
            <div class="w-av">⚙</div>
            <span class="w-label">Aria · MCP Agent</span>
          </div>
          <div class="w-body">
            Ask me anything — I can search the web, check weather, get the time, and read or edit documents.
          </div>
          <div class="chips">
            <button class="chip" onclick="fill('What is the weather in Mumbai?')">🌤 Weather in Mumbai</button>
            <button class="chip" onclick="fill('What is the latest news in India?')">📰 Latest India news</button>
            <button class="chip" onclick="fill('What time is it in Tokyo?')">🕐 Time in Tokyo</button>
            <button class="chip" onclick="fill('What is machine learning?')">🤖 What is ML?</button>
          </div>
        </div>
      </div>
    </div>

    <div id="ibar">
      <div class="iinner">
        <div class="itabs">
          <button class="itab active" id="tc">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>Chat
          </button>
          <button class="itab" id="te" onclick="toggleDbg()">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>Events
          </button>
        </div>
        <div class="ibox">
          <textarea id="q" placeholder="Ask anything…" rows="1"></textarea>
          <span class="ihint">Enter ↵</span>
          <button id="sbtn" onclick="send()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="dbg">
    <div class="dbg-top">
      <div class="dbg-title"><div class="dbg-dot"></div>Event Stream</div>
      <div class="dbg-acts">
        <button class="dbg-btn" onclick="document.getElementById('dbg-log').innerHTML=''">Clear</button>
        <button class="dbg-btn" onclick="toggleDbg()">✕</button>
      </div>
    </div>
    <div id="dbg-log"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
