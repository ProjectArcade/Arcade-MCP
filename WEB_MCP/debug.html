<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCP Agent</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-agent">
    <div class="ag-av">⚙</div>
    <div style="display:flex;flex-direction:column;">
      <span class="ag-name">MCP Agent</span>
      <span class="ag-sub" id="amodel">connecting…</span>
    </div>
    <span class="badge off" id="abadge">OFFLINE</span>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" id="dbgbtn" onclick="toggleDbg()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </button>
  </div>
</nav>

<div class="main">
  <div id="chat-wrap">
    <div id="chat">
      <div class="chat-inner" id="ci">

      </div>
    </div>

    <div id="ibar">
      <div class="iinner">
        <div class="itabs">
          <button class="itab active" id="tc">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>Chat
          </button>
          <button class="itab" id="te" onclick="toggleDbg()">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>Events
          </button>
        </div>
        <div class="ibox">
          <textarea id="q" placeholder="Ask anything…" rows="1"></textarea>
          <span class="ihint">Enter to send</span>
          <button id="sbtn" onclick="send()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="dbg">
    <div class="dbg-top">
      <div class="dbg-title"><div class="dbg-dot"></div>Event Stream</div>
      <div class="dbg-acts">
        <button class="dbg-btn" onclick="document.getElementById('dbg-log').innerHTML=''">Clear</button>
        <button class="dbg-btn" onclick="toggleDbg()">✕</button>
      </div>
    </div>
    <div id="dbg-log"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
